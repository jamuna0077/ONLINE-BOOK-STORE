<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Online Book Store</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
        }

        h1 {
            background-color: darkblue;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .book {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            width: 220px;
        }

        .book img {
            width: 150px;
            height: 200px;
        }

        button {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkgreen;
        }

        #orderPage {
            display: none;
            margin-top: 30px;
        }

        input {
            padding: 8px;
            margin: 8px;
            width: 250px;
        }
    </style>
</head>
<body>

<h1>Online Book Store</h1>

<div id="bookStore">
    <div class="container">

        <div class="book">
            <h3>Python Programming</h3>
            <p>Price: ₹500</p>
            <a href="order.html">
    <button>Buy Now</button>
</a>
            <button onclick="buyBook('Python Programming',500)">
                Buy Now
            </button>
        </div>

        <div class="book">
            <h3>Java Programming</h3>
            <p>Price: ₹600</p>
            <a href="order.html">
    <button>Buy Now</button>
</a>
            
            <button onclick="buyBook('Java Programming',600)">
                Buy Now
            </button>
        </div>

        <div class="book">
            <h3>Web Development</h3>
            <p>Price: ₹700</p>
            <a href="order.html">
    <button>Buy Now</button>
</a>
            <button onclick="buyBook('Web Development',700)">
                Buy Now
            </button>
        </div>

    </div>
</div>

<div id="orderPage">
    <h2>Order Details</h2>

    <p><strong>Book:</strong> <span id="bookName"></span></p>
    <p><strong>Price:</strong> ₹<span id="bookPrice"></span></p>

    <input type="text" placeholder="Enter Your Name"><br>
    <input type="text" placeholder="Enter Address"><br>

    <button onclick="placeOrder()">Place Order</button>
</div>

<script>
function buyBook(name, price) {
    document.getElementById("bookStore").style.display = "none";
    document.getElementById("orderPage").style.display = "block";

    document.getElementById("bookName").innerText = name;
    document.getElementById("bookPrice").innerText = price;
}

function placeOrder() {
    alert("Order Placed Successfully!");
}
</script>

</body>
</html>
</html>
