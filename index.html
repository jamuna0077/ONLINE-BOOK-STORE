<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Online Book Store</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            background-color: darkblue;
            color: white;
            padding: 15px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .book {
            background: white;
            padding: 15px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Online Book Store</h1>

<div class="container">

    <div class="book">
        <h3>Python Programming</h3>
        <p>Price: ₹500</p>
        <button onclick="buyBook('Python Programming',500)">Buy Now</button>
    </div>

    <div class="book">
        <h3>Java Programming</h3>
        <p>Price: ₹600</p>
        <button onclick="buyBook('Java Programming',600)">Buy Now</button>
    </div>

    <div class="book">
        <h3>Web Development</h3>
        <p>Price: ₹700</p>
        <button onclick="buyBook('Web Development',700)">Buy Now</button>
    </div>

</div>

<script>
function buyBook(book, price) {
    localStorage.setItem("book", book);
    localStorage.setItem("price", price);
    window.location.href = "order.html";
}
</script>

</body>
</html>
